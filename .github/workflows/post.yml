name: Post to X

# NOTE: push トリガーは無効化中 (2026-04-21)
# 理由: X API PPU の Standalone App は /2/tweets で 403
# Project 紐付けの Support 依頼結果待ち。Make.com 側で投稿中。
# 復旧時: 下の workflow_dispatch を push: branches/paths 形式に戻す。
on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-save twitter-api-v2
      - run: node scripts/post.js
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted/ drafts/pending/
          git diff --staged --quiet || git commit -m "auto: posted to X"
          git push
